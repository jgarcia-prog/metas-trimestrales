<title>Metas Trimestrales Mayoreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:   #f8f9fb;
    --card: #ffffff;
    --text: #111827;
    --sub:  #6b7280;
    --border: #e5e7eb;
    --radius: 20px;
  }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .header {
    text-align: center;
    margin-bottom: 56px;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 14px;
  }
  .header-title {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 16px;
    color: var(--sub);
    margin-top: 12px;
    font-weight: 400;
  }
  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 1100px;
    width: 100%;
  }
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    width: 190px;
    padding: 32px 20px 28px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform 0.2s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.1);
    border-color: var(--accent);
  }
  .card:hover::after { transform: scaleX(1); }
  .card-logo {
    width: 110px;
    height: 110px;
    object-fit: contain;
    border-radius: 12px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--sub);
  }
  .card-enter {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 100px;
    background: var(--accent-bg);
    color: var(--accent);
    transition: background 0.15s;
  }
  .card:hover .card-enter {
    background: var(--accent);
    color: #fff;
  }
  .footer {
    margin-top: 56px;
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
  }
  @media (max-width: 600px) {
    .grid { gap: 14px; }
    .card { width: 145px; padding: 24px 14px 20px; }
    .card-logo { width: 80px; height: 80px; }
  }
</style>
</head>
